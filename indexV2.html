<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Cache-Control" content="no-store" />
<title>Portal</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: black !important;
  color: #bb86fc;
  font-family: monospace;
  overflow: hidden;
}

/* Moving background */
.bg {
  position: fixed;
  width: 200%;
  height: 200%;
  background-image: radial-gradient(#bb86fc 1px, transparent 1px);
  background-size: 40px 40px;
  opacity: 0.12;
  animation: moveBg 60s linear infinite;
}

@keyframes moveBg {
  to { transform: translate(-50%, -50%); }
}

/* Center */
.center {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 90%;
}

/* Terminal lines */
.terminal div {
  font-size: 4vw;
  opacity: 0;
  margin: 5px 0;
}

/* Sequential appearance */
.terminal div:nth-child(1) { animation: show 0.5s forwards 0s; }
.terminal div:nth-child(2) { animation: show 0.5s forwards 1s; }
.terminal div:nth-child(3) { animation: show 0.5s forwards 2s; }
.terminal div:nth-child(4) { animation: show 0.5s forwards 3s; }
.terminal div:nth-child(5) { animation: show 0.5s forwards 4s; }
.terminal div:nth-child(6) { animation: show 0.5s forwards 5s; }

@keyframes show {
  to { opacity: 1; }
}

/* Fade terminal out */
.terminal {
  animation: fadeOut 1s forwards;
  animation-delay: 6.5s;
}

@keyframes fadeOut {
  to { opacity: 0; }
}

/* Main content */
#main {
  opacity: 0;
  text-align: center;
  animation: fadeIn 2s forwards;
  animation-delay: 7s;
}

@keyframes fadeIn {
  to { opacity: 1; }
}

/* Glitch text */
.glitch {
  font-size: 8vw;
  position: relative;
}

.glitch::before,
.glitch::after {
  content: attr(data-text);
  position: absolute;
  left: 0;
  width: 100%;
}

.glitch::before {
  color: #ff00ff;
  animation: glitchTop 1s infinite;
}

.glitch::after {
  color: #00ffff;
  animation: glitchBottom 1s infinite;
}

@keyframes glitchTop {
  50% { transform: translate(-2px, -2px); }
}

@keyframes glitchBottom {
  50% { transform: translate(2px, 2px); }
}

/* Sub text */
.sub {
  margin-top: 10px;
  font-size: 4vw;
  color: #8a2be2;
}

/* Desktop scaling */
@media (min-width: 768px) {
  .terminal div { font-size: 18px; }
  .glitch { font-size: 40px; }
  .sub { font-size: 18px; }
}

</style>
</head>

<body>

<div class="bg"></div>

<!-- TERMINAL -->
<div class="center terminal">
  <div>> establishing connection...</div>
  <div>> scanning network...</div>
  <div>> device detected</div>
  <div>> IP: 192.168.4.23</div>
  <div>> bypassing security...</div>
  <div>> access granted</div>
</div>

<!-- FINAL -->
<div class="center" id="main">
  <div class="glitch" data-text="ACCESS GRANTED">ACCESS GRANTED</div>
  <div class="sub">Pwned by Izzy</div>
</div>

</body>
</html>
