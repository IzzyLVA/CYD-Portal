<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Cache-Control" content="no-store" />
<title>Portal</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: black !important;
  color: #bb86fc;
  font-family: monospace;
  overflow: hidden;
}

/* Moving background */
.bg {
  position: fixed;
  width: 200%;
  height: 200%;
  background-image: radial-gradient(#bb86fc 1px, transparent 1px);
  background-size: 40px 40px;
  opacity: 0.15;
  animation: moveBg 60s linear infinite;
}

@keyframes moveBg {
  from { transform: translate(0,0); }
  to { transform: translate(-50%, -50%); }
}

/* Center container */
.center {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 90%;
  text-align: center;
}

/* Loading */
#loading {
  animation: fadeOut 1s ease forwards;
  animation-delay: 2.5s;
}

@keyframes fadeOut {
  to { opacity: 0; visibility: hidden; }
}

/* Typing */
.type {
  font-size: 4vw;
  white-space: nowrap;
  overflow: hidden;
  border-right: 2px solid #bb86fc;
  width: 0;
  animation: typing 2s steps(30, end) forwards, blink 0.7s infinite;
}

@keyframes typing {
  to { width: 100%; }
}

@keyframes blink {
  50% { border-color: transparent; }
}

/* Main content */
#main {
  opacity: 0;
  animation: fadeIn 2s ease forwards;
  animation-delay: 2.7s;
}

@keyframes fadeIn {
  to { opacity: 1; }
}

/* Glitch text */
.glitch {
  font-size: 8vw; /* responsive */
  line-height: 1.2;
  position: relative;
}

.glitch::before,
.glitch::after {
  content: attr(data-text);
  position: absolute;
  left: 0;
  width: 100%;
}

.glitch::before {
  color: #ff00ff;
  animation: glitchTop 1s infinite;
}

.glitch::after {
  color: #00ffff;
  animation: glitchBottom 1s infinite;
}

@keyframes glitchTop {
  50% { transform: translate(-2px, -2px); }
}

@keyframes glitchBottom {
  50% { transform: translate(2px, 2px); }
}

/* Sub text */
.sub {
  margin-top: 15px;
  font-size: 4vw;
  color: #8a2be2;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  50% { opacity: 0.5; }
}

/* Desktop scaling */
@media (min-width: 768px) {
  .glitch {
    font-size: 40px;
  }
  .sub {
    font-size: 18px;
  }
  .type {
    font-size: 18px;
  }
}

</style>
</head>

<body>

<div class="bg"></div>

<!-- Loading -->
<div class="center" id="loading">
  <div class="type">> establishing connection...</div>
</div>

<!-- Main -->
<div class="center" id="main">
  <div class="glitch" data-text="ACCESS GRANTED">ACCESS GRANTED</div>
  <div class="sub">Pwned by Izzy</div>
</div>

</body>
</html>
